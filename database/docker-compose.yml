services:
  db:
    image: postgres:16-alpine
    container_name: med_bio_db
    environment:
      POSTGRES_DB: medical_biosecurity
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d medical_biosecurity"]
      interval: 10s
      timeout: 5s
      retries: 5